<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NOVA XMD V1 • Pairing</title>
  <meta name="description" content="Connectez facilement votre numéro WhatsApp à NOVA XMD V1 grâce au code de pairing." />
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    :root{
      --bg1:#07110d;
      --bg2:#031b14;
      --card:rgba(8,25,18,.88);
      --border:rgba(0,255,153,.18);
      --text:#dfffee;
      --muted:#89c8ae;
      --primary:#00ff99;
      --primary2:#00f7ff;
      --danger:#ff6b6b;
      --warning:#ffd166;
      --shadow:0 20px 60px rgba(0,0,0,.40);
    }

    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      background:
        radial-gradient(circle at top, rgba(0,255,153,.10), transparent 30%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      font-family:Arial, sans-serif;
      color:var(--text);
    }

    .card{
      width:min(460px, 100%);
      background:var(--card);
      border:1px solid var(--border);
      border-radius:24px;
      padding:28px 22px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
    }

    .badge{
      display:inline-block;
      padding:8px 14px;
      border-radius:999px;
      background:rgba(0,255,153,.08);
      border:1px solid rgba(0,255,153,.15);
      color:var(--primary);
      font-size:12px;
      font-weight:700;
      margin-bottom:16px;
    }

    h1{
      font-size:28px;
      color:var(--primary);
      margin-bottom:10px;
      line-height:1.2;
    }

    p{
      color:var(--muted);
      font-size:14px;
      line-height:1.6;
      margin-bottom:18px;
    }

    .input-group{
      margin-top:12px;
    }

    label{
      display:block;
      margin-bottom:8px;
      font-size:13px;
      color:#b8f7da;
      font-weight:700;
    }

    input{
      width:100%;
      padding:15px 16px;
      border-radius:16px;
      border:1px solid var(--border);
      background:#081912;
      color:#fff;
      outline:none;
      font-size:15px;
      transition:.2s ease;
    }

    input:focus{
      border-color:rgba(0,255,153,.45);
      box-shadow:0 0 0 3px rgba(0,255,153,.08);
    }

    input::placeholder{
      color:#78a892;
    }

    button{
      width:100%;
      margin-top:16px;
      padding:15px;
      border:none;
      border-radius:16px;
      font-weight:700;
      font-size:15px;
      cursor:pointer;
      background:linear-gradient(135deg,var(--primary),var(--primary2));
      color:#06120d;
      transition:transform .15s ease, opacity .2s ease;
    }

    button:hover{
      transform:translateY(-1px);
    }

    button:disabled{
      opacity:.7;
      cursor:not-allowed;
      transform:none;
    }

    .result{
      margin-top:18px;
      padding:16px;
      border-radius:16px;
      background:rgba(0,0,0,.18);
      border:1px solid var(--border);
      text-align:center;
      min-height:62px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:15px;
      color:var(--muted);
      word-break:break-word;
    }

    .code{
      font-size:28px;
      font-weight:800;
      color:var(--primary);
      letter-spacing:2px;
    }

    .error{
      color:var(--danger);
      font-weight:700;
    }

    .success{
      color:var(--primary);
      font-weight:700;
    }

    .footer{
      margin-top:18px;
      text-align:center;
      color:#74ad93;
      font-size:12px;
      line-height:1.5;
    }

    .hint{
      margin-top:12px;
      font-size:12px;
      color:#9bd8bb;
      line-height:1.5;
    }

    @media (max-width:480px){
      .card{
        padding:22px 16px;
        border-radius:20px;
      }

      h1{
        font-size:24px;
      }

      .code{
        font-size:24px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">NOVA XMD V1 • OFFICIAL PAIRING</div>

    <h1>Connectez votre WhatsApp</h1>
    <p>
      Entrez votre numéro WhatsApp avec l’indicatif du pays pour générer votre code de pairing.
      Exemple : <strong>226XXXXXXXX</strong>
    </p>

    <div class="input-group">
      <label for="number">Numéro WhatsApp</label>
      <input
        type="tel"
        id="number"
        placeholder="Ex: 226XXXXXXXX"
        inputmode="numeric"
        autocomplete="off"
      />
    </div>

    <button id="pairBtn" onclick="generateCode()">Générer le code</button>

    <div class="result" id="result">Le code apparaîtra ici</div>

    <div class="hint">
      N’ajoutez pas <strong>+</strong>, espaces, tirets ou caractères spéciaux.
    </div>

    <div class="footer">
      DEV NOVA • NOVA XMD V1
    </div>
  </div>

  <script>
    async function generateCode() {
      const numberInput = document.getElementById("number");
      const result = document.getElementById("result");
      const button = document.getElementById("pairBtn");

      let number = numberInput.value.trim().replace(/\D/g, "");

      if (!number) {
        result.innerHTML = '<span class="error">Entrez un numéro valide</span>';
        return;
      }

      if (number.length < 8) {
        result.innerHTML = '<span class="error">Numéro trop court</span>';
        return;
      }

      button.disabled = true;
      button.textContent = "Chargement...";
      result.innerHTML = "Génération du code...";

      try {
        const res = await fetch(`/pair?number=${encodeURIComponent(number)}`);
        const data = await res.json();

        if (res.ok && data.code) {
          result.innerHTML = `<span class="code">${data.code}</span>`;
        } else {
          result.innerHTML = `<span class="error">${data.message || "Erreur lors de la génération"}</span>`;
        }
      } catch (e) {
        result.innerHTML = '<span class="error">Impossible de générer le code</span>';
      } finally {
        button.disabled = false;
        button.textContent = "Générer le code";
      }
    }

    document.getElementById("number").addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        generateCode();
      }
    });
  </script>
</body>
</html>
